name: Daily Gather

on:
  schedule:
    - cron: '37 7 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  gather:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # 允许 push 去重文件

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # 需要写入权限来更新去重文件
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install system dependencies
        run: |
          # Configure apt-get with retries and 30s timeouts to prevent hanging on slow mirrors
          sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout="40" update
          sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout="40" install -y --no-install-recommends fonts-wqy-zenhei

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare config.json
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          if [ -n "$CONFIG_JSON" ]; then
            echo "Using CONFIG_JSON from GitHub Secret"
            echo "$CONFIG_JSON" > config.json
          elif [ -f config.json ]; then
            echo "Using config.json from repository"
          else
            echo "::error::No config found. Set CONFIG_JSON secret or commit config.json to the repo."
            exit 1
          fi
          # Validate JSON
          python -c "import json; json.load(open('config.json'))" \
            || { echo "::error::config.json contains invalid JSON. Validate at https://jsonlint.com"; exit 1; }
          echo "✓ config.json is valid"

      - name: Cache dedup records
        uses: actions/cache@v4
        with:
          path: data/fetched_urls.txt
          key: ${{ runner.os }}-dedup-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-dedup-

      - name: Run Ought Gather
        env:
          # 时区设置：使用北京时间 UTC+8
          TZ: Asia/Shanghai

          # SMTP 配置（必需）
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}

          # 自动注入 Secrets
          OPENROUTER_API_ENDPOINT: ${{ secrets.OPENROUTER_API_ENDPOINT }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          QWEATHER_HOST: ${{ secrets.QWEATHER_HOST }}
          QWEATHER_KEY: ${{ secrets.QWEATHER_KEY }}
          RAINDROPIO_API_KEY: ${{ secrets.RAINDROPIO_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TESTMAIL_APP_API_KEY: ${{ secrets.TESTMAIL_APP_API_KEY }}

        run: |
          python src/main.py

      - name: Upload EPUB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: epub-files
          path: output/*.epub
          retention-days: 7

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/*.log
          retention-days: 7
