name: Sync Project Docs and Config Schema
on:
  push:
    branches: [ main ]
    paths:
      - 'src/fetchers/*.py'
      - 'scripts/update_readme_secrets.py'
      - 'scripts/update_workflow_secrets.py'
      - 'scripts/update_editor.py'
      - 'README.md'
      - '.github/workflows/daily-gather.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run sync scripts
        run: |
          python scripts/update_readme_secrets.py
          python scripts/update_workflow_secrets.py
          python scripts/update_editor.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain README.md config-editor.html) ]]; then
            git add README.md config-editor.html
            git commit -m "chore: sync README secrets and UI config schema"
            git push
          else
            echo "No changes to sync"
          fi
